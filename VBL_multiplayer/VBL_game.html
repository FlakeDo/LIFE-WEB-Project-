<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survive!</title>

<link rel="stylesheet" type="text/css" href="VBL_game.css" />

</head>

<body>

<h1>Very Bad Lands</h1>

<!-- PRÉPARATION DE PARTIE -->
<section id="setup">
  <div>
    <label for="player-name">Ton nom :</label>
    <input type="text" id="player-name" autocomplete="off">
  </div>

  <div id="join-status"></div>

  <button id="btn-join">Rejoindre la partie</button>

  <!-- Visible par tous, mais seul l'hôte clique dessus une fois tous prêts -->
  <button id="btn-launch" disabled>Lancer la partie</button>

  <p id="setup-hint">L'hôte clique sur "Lancer" une fois que tous les joueurs ont rejoint.</p>
</section>

<!-- IN GAME -->
<section id="game">

  <!-- Bannière de phase -->
  <div id="phase-banner"></div>

  <!-- Joueurs -->
  <div id="players-row">
  </div>

  <!-- Affichage de la rivière -->
  <div id="river-section">
    <h2>Rivière</h2>
    <div id="river-cards">
    </div>
  </div>

  <!-- Zone d'aides -->
  <div id="helpers">
    <button id="rules">Règles</button>
    <button id="cards-help">Cartes</button>
  </div>


  <!-- Zone d'action du joueur -->
  <div id="active-panel">
    <h2>Tour de <span id="active-name"></span></h2>

    <div id="active-card-display">
    </div>

    <div id="action-buttons">
    </div>
  </div>

  <!-- Affichage des événements -->
  <div id="log-section">
    <h2>Événements</h2>

    <div id="log">
    </div>
  </div>

  <button id="btn-abort">Annuler la Partie</button>
</section>



<!-- ÉCRAN D'AIDE -->
<div id="helpers-display">
  <div id="helpers-panel">
    <h2 id="help-title"></h2>
    <div id="help-body"></div>
    <button id="help-close">Fermer</button>
  </div>
</div>


<!-- ÉCRAN DE GAME OVER -->
<div id="gameover">
  <h2 id="gameover-title"></h2> <!-- Titre vide qui sert à afficher le perdant à la fin de la partie. -->

  <p id="gameover-body"></p>  <!-- Paragraphe vide qui sert à afficher les infos de fin de partie. -->

  <button id="gameover-btn">Nouvelle partie</button>
</div>

<script src="VBL_client.js" type="text/javascript"></script>

</body>
</html>
