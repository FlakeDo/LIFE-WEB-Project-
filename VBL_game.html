<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survive!</title>

<link rel="stylesheet" type="text/css" href="VBL_game.css" />

</head>

<body>

<h1>🦕 SURVIVE!</h1>

<!-- ===== SETUP ===== -->
<section id="setup">
  <div>
    <label for="n-players">Nombre de joueurs (3–6) : </label>
    <input type="number" id="n-players" min="3" max="6" value="3">
  </div>
  <div id="name-inputs"></div>
  <button id="btn-start">Commencer la partie</button>
</section>

<!-- ===== GAME ===== -->
<section id="game">
  <div id="phase-banner">Phase d'échange</div>

  <div id="players-row"></div>

  <div id="river-section">
    <h2>Rivière</h2>
    <div id="river-cards"></div>
  </div>

  <div id="active-panel">
    <h2>Tour de <span id="active-name">—</span></h2>
    <div id="active-card-display">?</div>
    <div id="action-buttons"></div>
  </div>

  <div id="log-section">
    <h2>Événements</h2>
    <div id="log"></div>
  </div>
</section>

<!-- ===== GAME OVER ===== -->
<div id="gameover">
  <h2 id="go-title">Fin de partie</h2>
  <p id="go-body"></p>
  <button onclick="location.reload()">Nouvelle partie</button>
</div>

<script src="VBL_game.js" type="text/javascript"></script>

</body>
</html>
